{% extends "base.html" %}
{% block title %}Select Ballot - {{ super() }}{% endblock %}

{% block content %}
<div class="card content-card">
    <div class="card-body">
        <h1 class="card-title text-center mb-4">Student Voting Portal</h1>
        <p class="text-center text-muted">Please choose what ballot you are voting on.</p>
        <form method="post">
            <div class="mb-3">
                <label for="year" class="form-label">Election / Ballot</label>
                <select class="form-select" id="year" name="year" required>
                    <option selected disabled value="">Choose...</option>
                    {% for election in elections %}
                    <option value="{{ election }}">{{ election }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Continue</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
